settings_file: settings.yaml
data_sources:
  cosmic:
    enabled: true
    tsv: data/cosmic/Cosmic_GenomeScreensMutant_v103_GRCh38.tsv.gz
    vcf: data/cosmic/Cosmic_GenomeScreensMutant_v103_GRCh38.vcf.gz
    chunk_size: 200000
  oncokb:
    enabled: true
    variants_file: data/oncokb/allAnnotatedVariants.txt
  cbioportal:
    enabled: false
    api_base: https://www.cbioportal.org/api
  clinvar:
    enabled: true
    vcf: data/clinvar/clinvar.vcf.gz
  genie:
    enabled: true
    version: v19
    maf: data/genie/data_mutations_extended_grch38_lifted.txt
    clinical_sample: data/genie/data_clinical_sample.txt
  tp53:
    enabled: true
    somatic_tsv: data/tp53/SomaticVariants_GRCh38.csv
    germline_tsv: data/tp53/GermlineVariants_GRCh38.csv
    include_germline: false
  cancer_hotspots:
    enabled: true
    tsv: data/hotspots/hotspots_grch38_mane.tsv
    max_qvalue: 0.05
  tcga:
    enabled: true
    maf: data/TCGA/mc3.v0.2.8.PUBLIC.GRCh38.maf.gz
reference:
  fasta: data/reference/GRCh38.fa
  liftover_chain: data/reference/hg19ToHg38.over.chain.gz
  chain: data/reference/hg19ToHg38.over.chain.gz
output:
  dir: output
  prefix: pan_cancer_whitelist_GRCh38
intermediate_dir: intermediate
